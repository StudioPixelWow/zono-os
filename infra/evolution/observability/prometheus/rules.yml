# ============================================================================
# ZONO — Personal WhatsApp (Beta) SLO recording rules + ALERT definitions.
# Goal: detect problems BEFORE users report them. Recording rules materialize
# the SLO ratios; alerts fire on breach, storms, auth failures, and worker loss.
# ============================================================================
groups:
  # ── SLO recording rules (5m windows) ─────────────────────────────────────
  - name: wa_personal_slo
    interval: 30s
    rules:
      # Connect success ratio (connected / all attempts, excluding disabled).
      - record: wa_personal:connect_success_ratio5m
        expr: |
          sum(rate(wa_personal_connect_total{outcome="connected"}[5m]))
          /
          clamp_min(sum(rate(wa_personal_connect_total{outcome!="disabled"}[5m])), 1)

      # Outbound delivery success ratio (sent / attempts that reached send,
      # excluding policy rejections: approval/rate/burst/cooldown/disabled).
      - record: wa_personal:outbound_success_ratio5m
        expr: |
          sum(rate(wa_personal_outbound_total{outcome="sent"}[5m]))
          /
          clamp_min(sum(rate(wa_personal_outbound_total{outcome=~"sent|failed"}[5m])), 1)

      # Inbound webhook processing success ratio (message+status / all handled).
      - record: wa_personal:inbound_success_ratio5m
        expr: |
          sum(rate(wa_personal_inbound_total{outcome=~"message|status"}[5m]))
          /
          clamp_min(sum(rate(wa_personal_inbound_total{outcome!~"disabled"}[5m])), 1)

      # p95 operation latency (seconds) across personal-transport spans.
      - record: wa_personal:op_latency_p95_5m
        expr: histogram_quantile(0.95, sum(rate(wa_personal_span_duration_seconds_bucket[5m])) by (le, op))

  # ── Alert definitions ────────────────────────────────────────────────────
  - name: wa_personal_alerts
    rules:
      - alert: PersonalWorkerScrapeDown
        expr: up{job="zono-wa-personal"} == 0
        for: 3m
        labels: { severity: critical, transport: personal }
        annotations:
          summary: "ZONO personal-transport metrics endpoint is down"
          description: "Prometheus cannot scrape /api/whatsapp/personal/metrics for 3m. Personal transport observability is blind. Playbook: PB-1."

      - alert: PersonalWorkerUnconfigured
        expr: wa_personal_worker_configured == 0
        for: 5m
        labels: { severity: warning, transport: personal }
        annotations:
          summary: "Personal transport backend reports unconfigured"
          description: "wa_personal_worker_configured=0 for 5m (Evolution URL/key missing or app can't see it). Playbook: PB-2."

      - alert: PersonalHighOutboundFailureRate
        expr: |
          (sum(rate(wa_personal_outbound_total{outcome="failed"}[10m]))
           / clamp_min(sum(rate(wa_personal_outbound_total{outcome=~"sent|failed"}[10m])), 1)) > 0.2
        for: 10m
        labels: { severity: critical, transport: personal }
        annotations:
          summary: "Personal outbound failure rate > 20%"
          description: "Outbound sends are failing above SLO. Likely session drop / worker issue. Playbook: PB-3."

      - alert: PersonalInboundProcessingErrors
        expr: sum(rate(wa_personal_inbound_total{outcome=~"error|rejected_.*"}[10m])) > 0.1
        for: 10m
        labels: { severity: warning, transport: personal }
        annotations:
          summary: "Personal inbound webhook processing errors"
          description: "Inbound events are erroring/being rejected. Check ownership/dedup + worker payloads. Playbook: PB-4."

      - alert: PersonalQrFailureSpike
        expr: sum(rate(wa_personal_qr_generated_total{outcome="error"}[10m])) > 0.1
        for: 10m
        labels: { severity: warning, transport: personal }
        annotations:
          summary: "Personal QR generation failures"
          description: "QR pairing is failing — agents cannot connect. Playbook: PB-5."

      - alert: PersonalReconnectStorm
        expr: sum(rate(wa_personal_reconnect_total{outcome="requested"}[5m])) > 0.5
        for: 5m
        labels: { severity: warning, transport: personal }
        annotations:
          summary: "Personal reconnect storm"
          description: "High reconnect request rate — sessions are flapping. Risk of worker/DB load + WhatsApp throttling. Playbook: PB-6."

      - alert: PersonalWebhookAuthFailures
        expr: sum(rate(wa_personal_webhook_auth_failures_total[5m])) > 0
        for: 5m
        labels: { severity: warning, transport: personal }
        annotations:
          summary: "Personal webhook auth failures (fail-closed)"
          description: "Inbound webhooks are being rejected (403). Token drift or unauthorized caller. Playbook: PB-7."

      - alert: PersonalConnectSuccessSLOBreach
        expr: wa_personal:connect_success_ratio5m < 0.90
        for: 15m
        labels: { severity: warning, transport: personal }
        annotations:
          summary: "Personal connect success ratio below SLO (90%)"
          description: "Connect SLO breached for 15m. Investigate worker/QR path. Playbook: PB-5."

      - alert: PersonalOpLatencyHigh
        expr: max(wa_personal:op_latency_p95_5m) > 8
        for: 10m
        labels: { severity: warning, transport: personal }
        annotations:
          summary: "Personal transport p95 latency > 8s"
          description: "Operations are slow (worker/network). Playbook: PB-3."

  # ── Error budget (6.6A.2) — 30d SLO consumption + freeze thresholds ────────
  - name: wa_personal_error_budget
    interval: 60s
    rules:
      # 30d success ratios.
      - record: wa_personal:connect_success_ratio30d
        expr: |
          sum(rate(wa_personal_connect_total{outcome="connected"}[30d]))
          / clamp_min(sum(rate(wa_personal_connect_total{outcome!="disabled"}[30d])), 1)
      - record: wa_personal:outbound_success_ratio30d
        expr: |
          sum(rate(wa_personal_outbound_total{outcome="sent"}[30d]))
          / clamp_min(sum(rate(wa_personal_outbound_total{outcome=~"sent|failed"}[30d])), 1)
      - record: wa_personal:inbound_success_ratio30d
        expr: |
          sum(rate(wa_personal_inbound_total{outcome=~"message|status"}[30d]))
          / clamp_min(sum(rate(wa_personal_inbound_total{outcome!~"disabled"}[30d])), 1)
      # Budget consumed = observed error rate / allowed error rate (1 - SLO).
      # SLOs: connect 95% (budget 5%), outbound 98% (2%), inbound 99% (1%).
      - record: wa_personal:connect_error_budget_consumed30d
        expr: (1 - wa_personal:connect_success_ratio30d) / 0.05
      - record: wa_personal:outbound_error_budget_consumed30d
        expr: (1 - wa_personal:outbound_success_ratio30d) / 0.02
      - record: wa_personal:inbound_error_budget_consumed30d
        expr: (1 - wa_personal:inbound_success_ratio30d) / 0.01
      # Worst-case consumption across the three SLOs drives the freeze policy.
      - record: wa_personal:error_budget_consumed30d
        expr: |
          max(
            wa_personal:connect_error_budget_consumed30d
            or wa_personal:outbound_error_budget_consumed30d
            or wa_personal:inbound_error_budget_consumed30d
          )

      - alert: PersonalErrorBudget50pct
        expr: wa_personal:error_budget_consumed30d > 0.5
        for: 1h
        labels: { severity: warning, transport: personal, policy: feature_freeze }
        annotations:
          summary: "Personal Beta error budget >50% consumed — FREEZE new features"
          description: "More than 50% of the 30d error budget is spent. Policy: freeze new Personal QR features; prioritize reliability work. Playbook: PB-EB."

      - alert: PersonalErrorBudget100pct
        expr: wa_personal:error_budget_consumed30d >= 1.0
        for: 1h
        labels: { severity: critical, transport: personal, policy: feature_stop }
        annotations:
          summary: "Personal Beta error budget EXHAUSTED — STOP feature work"
          description: "100% of the 30d error budget is consumed. Policy: stop ALL Personal QR feature work; reliability work only until the SLO is back within budget. Playbook: PB-EB."

  # ── Synthetic monitoring (6.6A.2) — infra readiness alerts ─────────────────
  - name: wa_personal_synthetic
    rules:
      - alert: PersonalSyntheticDown
        expr: wa_personal_synthetic_up == 0
        for: 10m
        labels: { severity: critical, transport: personal }
        annotations:
          summary: "Personal synthetic monitor failing (infra not ready)"
          description: "A critical synthetic check has failed for 10m — the personal transport plumbing is not ready even before any user tries it. Playbook: PB-SYN."

      - alert: PersonalSyntheticCheckFailing
        expr: wa_personal_synthetic_check == 0
        for: 10m
        labels: { severity: warning, transport: personal }
        annotations:
          summary: "Personal synthetic check {{ $labels.check }} failing"
          description: "Synthetic check '{{ $labels.check }}' has been failing for 10m. Playbook: PB-SYN (per-check table)."

      - alert: PersonalSyntheticStale
        expr: (time() - wa_personal_synthetic_last_success_timestamp_seconds) > 900
        for: 10m
        labels: { severity: warning, transport: personal }
        annotations:
          summary: "Personal synthetic monitor has not passed in >15m"
          description: "No fully-passing synthetic run in 15m — the monitor may not be running (scheduler/scrape down) or infra is persistently unready. Playbook: PB-SYN."
