# Grafana dashboard provisioning — load JSON dashboards from disk.
apiVersion: 1
providers:
  - name: zono-wa-personal
    orgId: 1
    folder: "WA Personal (Beta)"
    type: file
    disableDeletion: false
    updateIntervalSeconds: 30
    allowUiUpdates: true
    options:
      path: /var/lib/grafana/dashboards
      foldersFromFilesStructure: false
