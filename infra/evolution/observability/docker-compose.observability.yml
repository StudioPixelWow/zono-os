# ============================================================================
# ZONO — Observability stack for the Personal WhatsApp (Beta) transport.
# Prometheus + Grafana + exporters. Runs alongside the Evolution worker compose
# (docker-compose.yml). Visibility only — it does not touch the transport.
# Bring up:  docker compose -f docker-compose.observability.yml up -d
# ============================================================================
services:
  prometheus:
    image: prom/prometheus:v2.54.1
    restart: always
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./prometheus/rules.yml:/etc/prometheus/rules/rules.yml:ro
      - prom_data:/prometheus
      # Mount your secret-managed metrics token at /etc/prometheus/secrets/metrics_token
      - ${METRICS_TOKEN_FILE:-/dev/null}:/etc/prometheus/secrets/metrics_token:ro
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.retention.time=15d
    ports: ["127.0.0.1:9090:9090"]

  grafana:
    image: grafana/grafana:11.2.0
    restart: always
    depends_on: [prometheus]
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:?set a Grafana admin password}
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana_data:/var/lib/grafana
    ports: ["127.0.0.1:3000:3000"]

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.49.1
    restart: always
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
    ports: ["127.0.0.1:8081:8080"]

  node-exporter:
    image: prom/node-exporter:v1.8.2
    restart: always
    ports: ["127.0.0.1:9100:9100"]

  postgres-exporter:
    image: prometheuscommunity/postgres-exporter:v0.15.0
    restart: always
    environment:
      DATA_SOURCE_NAME: ${EVOLUTION_DATABASE_URI:?}
    ports: ["127.0.0.1:9187:9187"]

  redis-exporter:
    image: oliver006/redis_exporter:v1.62.0
    restart: always
    environment:
      REDIS_ADDR: ${EVOLUTION_REDIS_URI:?}
    ports: ["127.0.0.1:9121:9121"]

volumes:
  prom_data:
  grafana_data:
